[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.19"
optimizer = true
optimizer_runs = 200
remappings = []

[profile.default.rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"
ethereum = "https://eth-mainnet.g.alchemy.com/v2/YOUR_API_KEY"

[profile.default.etherscan]
monad_testnet = { key = "YOUR_MONAD_TESTNET_API_KEY" }
